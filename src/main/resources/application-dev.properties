spring.docker.compose.enabled=false

spring.datasource.url=jdbc:h2:file:/data/alertsgpu;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2


# Scheduler
alerts.scheduler.enabled=true
alerts.scheduler.fixedDelayMs=300000


api.kabum.baseUrl=https://servicespub.prod.api.aws.grupokabum.com.br

alerts.notify.telegram.enabled=true
alerts.notify.telegram.botToken=${TELEGRAM_BOT_TOKEN:}
alerts.notify.telegram.chatId=${TELEGRAM_CHAT_ID:}