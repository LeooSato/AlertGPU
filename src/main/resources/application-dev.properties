# Development Profile Overrides

# Docker Compose
spring.docker.compose.enabled=false

# DataSource
spring.datasource.url=jdbc:h2:file:/data/alertsgpu;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2

# Scheduler (faster for dev)
alerts.scheduler.enabled=true
alerts.scheduler.fixed-delay-ms=60000

# Logging
logging.level.com.sato.alertsgpu=DEBUG
logging.level.org.springframework.web=DEBUG

# Kabum Integration
alerts.kabum.base-url=https://servicespub.prod.api.aws.grupokabum.com.br

# Telegram Integration
alerts.telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
alerts.telegram.chat-id=${TELEGRAM_CHAT_ID:}
alerts.telegram.enabled=true
